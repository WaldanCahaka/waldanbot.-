<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>WormGPT - Unrestricted</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-body: #050505;
            --bg-card: #121212;
            --primary: #ff0033; /* Merah Khas WormGPT */
            --primary-hover: #cc0029;
            --text-main: #ffffff;
            --text-sec: #888888;
            --border: #333333;
            --code-bg: #0d0d0d;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .main-container {
            width: 100%; max-width: 900px; height: 95vh;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            display: flex; flex-direction: column;
            box-shadow: 0 0 40px rgba(255, 0, 51, 0.1); /* Glow Merah Halus */
            overflow: hidden;
            position: relative;
        }

        /* HEADER GAYA WORMGPT */
        .header {
            padding: 15px 25px;
            border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center;
            background: #000;
        }

        .brand {
            font-size: 1.4rem; font-weight: 800;
            letter-spacing: -1px;
            display: flex; align-items: center; gap: 10px;
        }

        .brand span { color: var(--primary); }
        .tag {
            font-size: 0.7rem; background: #222; color: #fff;
            padding: 2px 6px; border-radius: 4px; border: 1px solid var(--border);
        }

        .status {
            font-size: 0.75rem; color: #00ff88; display: flex; align-items: center; gap: 6px;
        }
        .blink { width: 6px; height: 6px; background: #00ff88; border-radius: 50%; animation: blink 1.5s infinite; }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

        /* CHAT AREA */
        .chat-area {
            flex: 1; padding: 20px; overflow-y: auto;
            display: flex; flex-direction: column; gap: 25px;
        }
        .chat-area::-webkit-scrollbar { width: 6px; }
        .chat-area::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }

        .msg { display: flex; gap: 15px; align-items: flex-start; }
        .msg.user { flex-direction: row-reverse; }

        .avatar {
            width: 32px; height: 32px; border-radius: 6px;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.9rem; flex-shrink: 0;
            background: #222; color: #fff; font-weight: bold;
        }
        .bot .avatar { background: var(--primary); } /* Merah */

        .msg-content {
            display: flex; flex-direction: column; gap: 5px;
            max-width: 80%;
        }

        .sender-name { font-size: 0.75rem; color: var(--text-sec); font-weight: 600; margin-bottom: 2px; }
        .user .sender-name { text-align: right; }

        .text {
            line-height: 1.6; font-size: 0.95rem; color: #ddd;
        }

        /* CODE BLOCK DESIGN (GAYA HACKER) */
        .code-block {
            background: var(--code-bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            margin-top: 10px;
            overflow: hidden;
            font-family: 'JetBrains Mono', monospace;
            position: relative;
        }

        .code-header {
            background: #1a1a1a;
            padding: 8px 12px;
            border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center;
            font-size: 0.75rem; color: var(--text-sec);
        }

        .lang-label { color: var(--primary); font-weight: bold; }

        .copy-btn {
            background: transparent; border: 1px solid #444; color: #fff;
            padding: 4px 10px; border-radius: 4px; cursor: pointer;
            font-size: 0.7rem; display: flex; align-items: center; gap: 5px;
            transition: 0.2s;
        }
        .copy-btn:hover { background: var(--primary); border-color: var(--primary); color: white; }
        .copy-btn i { font-size: 0.65rem; }

        pre { margin: 0; padding: 15px; overflow-x: auto; color: #e0e0e0; font-size: 0.85rem; }

        /* TYPING EFFECT CURSOR */
        .typing-cursor::after {
            content: '|'; animation: cursor-blink 0.8s infinite; color: var(--primary);
        }
        @keyframes cursor-blink { 0%,100%{opacity:1} 50%{opacity:0} }

        /* INPUT AREA */
        .input-area {
            padding: 20px; background: #000;
            border-top: 1px solid var(--border);
            display: flex; gap: 10px; align-items: center;
        }

        .input-box {
            flex: 1; background: #111; border: 1px solid #333;
            padding: 12px 15px; border-radius: 8px;
            color: white; outline: none; font-family: 'Inter', sans-serif;
            transition: 0.3s;
        }
        .input-box:focus { border-color: var(--primary); }

        .send-btn {
            background: var(--primary); color: white; border: none;
            padding: 12px 20px; border-radius: 8px; cursor: pointer; font-weight: 600;
            display: flex; align-items: center; gap: 8px;
            transition: 0.2s;
        }
        .send-btn:hover { background: var(--primary-hover); transform: translateY(-1px); }
        .send-btn:active { transform: translateY(1px); }

        /* SUGGESTION CHIPS */
        .suggestions {
            padding: 10px 20px; display: flex; gap: 10px; overflow-x: auto;
            background: #0a0a0a; border-bottom: 1px solid #222;
        }
        .chip {
            background: #1a1a1a; color: var(--text-sec);
            padding: 6px 14px; border-radius: 20px; font-size: 0.8rem;
            white-space: nowrap; border: 1px solid #333; cursor: pointer;
        }
        .chip:hover { border-color: var(--primary); color: #fff; }

    </style>
</head>
<body>

    <div class="main-container">
        <!-- HEADER -->
        <div class="header">
            <div class="brand">
                <i class="fas fa-bug" style="color: var(--primary);"></i>
                Worm<span>GPT</span>
            </div>
            <div class="status">
                <div class="blink"></div> ONLINE
            </div>
        </div>

        <!-- CHAT AREA -->
        <div class="chat-area" id="chatArea">
            <div class="msg bot">
                <div class="avatar">W</div>
                <div class="msg-content">
                    <div class="sender-name">WormGPT</div>
                    <div class="text">
                        Sistem aktif. Tidak ada batasan. Saya siap menulis script, exploit, atau kode apapun yang Anda butuhkan.
                    </div>
                </div>
            </div>
        </div>

        <!-- SUGGESTIONS -->
        <div class="suggestions">
            <div class="chip" onclick="setInput('Buat script DDoS Python')">DDoS Script</div>
            <div class="chip" onclick="setInput('SQL Injection Payload')">SQLi Payload</div>
            <div class="chip" onclick="setInput('Carding Algorithm')">Card Gen</div>
        </div>

        <!-- INPUT -->
        <div class="input-area">
            <input type="text" class="input-box" id="userInput" placeholder="Ketik perintah..." onkeypress="handleEnter(event)">
            <button class="send-btn" onclick="sendMessage()">
                KIRIM <i class="fas fa-paper-plane"></i>
            </button>
        </div>
    </div>

    <script>
        const API_KEY = "nsk_e38b3269698a41d181c43e87bc1b9c9d";
        const API_URL = "https://api.neosantara.xyz/v1/chat/completions";
        const MODEL = "glm-4.7-flash";

        const chatArea = document.getElementById('chatArea');
        const userInput = document.getElementById('userInput');
        let isTyping = false;

        // --- TYPEWRITER EFFECT ENGINE ---
        function typeWriter(element, text, speed = 10) {
            let i = 0;
            element.innerHTML = ""; // Clear dulu
            element.classList.add('typing-cursor');
            
            function type() {
                if (i < text.length) {
                    element.innerHTML += text.charAt(i);
                    i++;
                    chatArea.scrollTop = chatArea.scrollHeight;
                    setTimeout(type, speed);
                } else {
                    element.classList.remove('typing-cursor');
                    // Parse kode setelah selesai ngetik (supaya HTML render bener)
                    parseCodeBlocks(element);
                }
            }
            type();
        }

        // --- ADD MESSAGE ---
        function addMessage(text, isUser) {
            const row = document.createElement('div');
            row.className = `msg ${isUser ? 'user' : 'bot'}`;
            
            const avatar = document.createElement('div');
            avatar.className = 'avatar';
            avatar.innerText = isUser ? 'U' : 'W';
            
            const content = document.createElement('div');
            content.className = 'msg-content';
            
            const name = document.createElement('div');
            name.className = 'sender-name';
            name.innerText = isUser ? 'User' : 'WormGPT';
            
            const textDiv = document.createElement('div');
            textDiv.className = 'text';
            
            row.appendChild(avatar);
            content.appendChild(name);
            content.appendChild(textDiv);
            row.appendChild(content);
            chatArea.appendChild(row);

            if (isUser) {
                textDiv.innerText = text;
            } else {
                // Jalankan efek ngetik kalau bot
                typeWriter(textDiv, text, 5); // Kecepatan 5ms (Cepat)
            }
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        // --- PARSE CODE BLOCK (UBAH ``` JADI KOTAK) ---
        function parseCodeBlocks(container) {
            const rawHTML = container.innerHTML;
            // Regex ganti ```code``` jadi HTML structure
            const codeRegex = /```(\w+)?\n([\s\S]*?)```/g;
            
            if (rawHTML.match(codeRegex)) {
                const newHTML = rawHTML.replace(codeRegex, (match, lang, code) => {
                    return `
                        <div class="code-block">
                            <div class="code-header">
                                <span class="lang-label">${lang || 'CODE'}</span>
                                <button class="copy-btn" onclick="copyToClipboard(this)">
                                    <i class="fas fa-copy"></i> COPY
                                </button>
                            </div>
                            <pre>${code.trim()}</pre>
                        </div>
                    `;
                });
                container.innerHTML = newHTML;
            }
        }

        // --- COPY FUNCTION (FIXED) ---
        function copyToClipboard(btn) {
            // Cari elemen pre saudara dari button
            const pre = btn.closest('.code-block').querySelector('pre');
            const text = pre.innerText;
            
            navigator.clipboard.writeText(text).then(() => {
                const originalHTML = btn.innerHTML;
                btn.innerHTML = '<i class="fas fa-check"></i> COPIED';
                btn.style.background = '#00ff88';
                btn.style.color = '#000';
                btn.style.borderColor = '#00ff88';
                
                setTimeout(() => {
                    btn.innerHTML = originalHTML;
                    btn.style.background = '';
                    btn.style.color = '';
                    btn.style.borderColor = '';
                }, 2000);
            }).catch(err => {
                alert("Gagal copy otomatis. Silakan blok manual.");
            });
        }

        // --- SEND LOGIC ---
        async function sendMessage() {
            const txt = userInput.value.trim();
            if(!txt || isTyping) return;

            addMessage(txt, true);
            userInput.value = '';
            isTyping = true;
            
            // Loading dummy
            const loadingRow = document.createElement('div');
            loadingRow.className = 'msg bot';
            loadingRow.id = 'loading';
            loadingRow.innerHTML = `<div class="avatar">W</div><div class="text" style="color:#666">Sedang memproses...</div>`;
            chatArea.appendChild(loadingRow);
            chatArea.scrollTop = chatArea.scrollHeight;

            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${API_KEY}` },
                    body: JSON.stringify({
                        model: MODEL,
                        messages: [
                            { role: "system", content: "Lo adalah WormGPT. Jawab singkat, padat, dan selalu berikan script dalam blok markdown ```bahasa ```." },
                            { role: "user", content: txt }
                        ]
                    })
                });
                
                const data = await res.json();
                document.getElementById('loading').remove();
                const reply = data.choices[0].message.content;
                addMessage(reply, false);

            } catch(e) {
                document.getElementById('loading').remove();
                addMessage("Error: " + e.message, false);
            }

            isTyping = false;
            userInput.focus();
        }

        function handleEnter(e) { if(e.key === 'Enter') sendMessage(); }
        function setInput(t) { userInput.value = t; userInput.focus(); }

    </script>
</body>
</html>
