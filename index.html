<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AI Chat - Neosantara GLM-4.7-Flash</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .chat-container {
            width: 100%;
            max-width: 500px;
            height: 95vh;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }

        .chat-header h1 {
            font-size: 1.5rem;
            margin-bottom: 5px;
        }

        .chat-header p {
            font-size: 0.8rem;
            opacity: 0.9;
        }

        .model-badge {
            background: rgba(255,255,255,0.2);
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            margin-top: 8px;
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f5f5f5;
        }

        .message {
            margin-bottom: 15px;
            display: flex;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            justify-content: flex-end;
        }

        .message.bot {
            justify-content: flex-start;
        }

        .message-content {
            max-width: 70%;
            padding: 10px 15px;
            border-radius: 18px;
            word-wrap: break-word;
            white-space: pre-wrap;
        }

        .user .message-content {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .bot .message-content {
            background: white;
            color: #333;
            border-bottom-left-radius: 4px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }

        .avatar {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 8px;
            font-size: 1.2rem;
        }

        .user .avatar {
            order: 2;
        }

        .typing-indicator {
            display: flex;
            align-items: center;
            padding: 10px 15px;
            background: white;
            border-radius: 18px;
            width: fit-content;
            gap: 5px;
        }

        .typing-indicator span {
            width: 8px;
            height: 8px;
            background: #999;
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }

        .typing-indicator span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-indicator span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typing {
            0%, 60%, 100% {
                transform: translateY(0);
                opacity: 0.5;
            }
            30% {
                transform: translateY(-10px);
                opacity: 1;
            }
        }

        .input-container {
            padding: 20px;
            background: white;
            border-top: 1px solid #e0e0e0;
            display: flex;
            gap: 10px;
        }

        .input-container input {
            flex: 1;
            padding: 12px 15px;
            border: 1px solid #e0e0e0;
            border-radius: 25px;
            outline: none;
            font-size: 1rem;
            transition: border-color 0.3s;
        }

        .input-container input:focus {
            border-color: #667eea;
        }

        .input-container button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1rem;
            transition: transform 0.2s, opacity 0.2s;
        }

        .input-container button:hover {
            transform: scale(1.02);
            opacity: 0.9;
        }

        .input-container button:active {
            transform: scale(0.98);
        }

        .input-container button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .clear-btn {
            background: #ff4757 !important;
        }

        .button-group {
            display: flex;
            gap: 10px;
        }

        .example-buttons {
            padding: 10px 20px;
            display: flex;
            gap: 10px;
            overflow-x: auto;
            background: white;
            border-top: 1px solid #e0e0e0;
        }

        .example-btn {
            background: #f0f0f0;
            border: none;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            cursor: pointer;
            white-space: nowrap;
            transition: background 0.2s;
        }

        .example-btn:hover {
            background: #e0e0e0;
        }

        @media (max-width: 768px) {
            .chat-container {
                height: 100vh;
                border-radius: 0;
            }
            
            .message-content {
                max-width: 85%;
            }
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <h1>🤖 AI Chat Assistant</h1>
            <p>Powered by Neosantara</p>
            <div class="model-badge">GLM-4.7-Flash</div>
        </div>

        <div class="messages" id="messages">
            <div class="message bot">
                <div class="avatar">🤖</div>
                <div class="message-content">
                    Halo! Saya adalah AI Assistant. Ada yang bisa saya bantu?
                </div>
            </div>
        </div>

        <div class="example-buttons" id="exampleButtons">
            <button class="example-btn" onclick="setExample('Apa itu kecerdasan buatan?')">🤔 Apa itu AI?</button>
            <button class="example-btn" onclick="setExample('Ceritakan tentang Indonesia')">🇮🇩 Indonesia</button>
            <button class="example-btn" onclick="setExample('Buatkan puisi tentang cinta')">📝 Puisi</button>
            <button class="example-btn" onclick="setExample('Tips belajar coding')">💻 Coding Tips</button>
        </div>

        <div class="input-container">
            <input type="text" id="userInput" placeholder="Ketik pesan Anda..." onkeypress="handleKeyPress(event)">
            <div class="button-group">
                <button onclick="clearChat()" class="clear-btn">🗑️</button>
                <button onclick="sendMessage()" id="sendBtn">Kirim ➤</button>
            </div>
        </div>
    </div>

    <script>
        // Konfigurasi API
        const API_KEY = "nsk_e38b3269698a41d181c43e87bc1b9c9d";
        const BASE_URL = "https://api.neosantara.xyz/v1";
        const MODEL = "glm-4.7-flash";

        let isTyping = false;

        // Fungsi untuk menampilkan pesan di chat
        function addMessage(text, isUser) {
            const messagesDiv = document.getElementById('messages');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isUser ? 'user' : 'bot'}`;
            
            const avatar = document.createElement('div');
            avatar.className = 'avatar';
            avatar.textContent = isUser ? '👤' : '🤖';
            
            const content = document.createElement('div');
            content.className = 'message-content';
            content.textContent = text;
            
            messageDiv.appendChild(avatar);
            messageDiv.appendChild(content);
            
            messagesDiv.appendChild(messageDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
            
            return messageDiv;
        }

        // Fungsi untuk menampilkan typing indicator
        function showTypingIndicator() {
            const messagesDiv = document.getElementById('messages');
            const typingDiv = document.createElement('div');
            typingDiv.className = 'message bot';
            typingDiv.id = 'typingIndicator';
            
            const avatar = document.createElement('div');
            avatar.className = 'avatar';
            avatar.textContent = '🤖';
            
            const indicator = document.createElement('div');
            indicator.className = 'typing-indicator';
            indicator.innerHTML = '<span></span><span></span><span></span>';
            
            typingDiv.appendChild(avatar);
            typingDiv.appendChild(indicator);
            
            messagesDiv.appendChild(typingDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function hideTypingIndicator() {
            const indicator = document.getElementById('typingIndicator');
            if (indicator) {
                indicator.remove();
            }
        }

        // Fungsi untuk memanggil API
        async function callAIAPI(prompt) {
            try {
                const response = await fetch(`${BASE_URL}/chat/completions`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${API_KEY}`
                    },
                    body: JSON.stringify({
                        model: MODEL,
                        messages: [
                            {
                                role: "system",
                                content: "Anda adalah asisten AI yang ramah, membantu, dan informatif. Jawablah dengan bahasa Indonesia yang baik dan benar."
                            },
                            {
                                role: "user",
                                content: prompt
                            }
                        ],
                        temperature: 0.7,
                        max_tokens: 1000
                    })
                });

                if (!response.ok) {
                    const errorData = await response.json().catch(() => ({}));
                    throw new Error(errorData.error?.message || `HTTP ${response.status}: ${response.statusText}`);
                }

                const data = await response.json();
                return data.choices[0]?.message?.content || "Maaf, saya tidak bisa menjawab pertanyaan itu.";
            } catch (error) {
                console.error('API Error:', error);
                throw new Error(`Error: ${error.message}`);
            }
        }

        // Fungsi utama untuk mengirim pesan
        async function sendMessage() {
            const input = document.getElementById('userInput');
            const message = input.value.trim();
            const sendBtn = document.getElementById('sendBtn');
            
            if (!message || isTyping) return;
            
            // Tampilkan pesan user
            addMessage(message, true);
            input.value = '';
            
            // Disable input dan button
            isTyping = true;
            sendBtn.disabled = true;
            input.disabled = true;
            
            // Tampilkan typing indicator
            showTypingIndicator();
            
            try {
                // Panggil API
                const aiResponse = await callAIAPI(message);
                hideTypingIndicator();
                addMessage(aiResponse, false);
            } catch (error) {
                hideTypingIndicator();
                console.error('Error:', error);
                addMessage(`❌ ${error.message || 'Terjadi kesalahan. Silakan coba lagi.'}`, false);
            } finally {
                // Enable kembali input dan button
                isTyping = false;
                sendBtn.disabled = false;
                input.disabled = false;
                input.focus();
            }
        }

        // Handle Enter key
        function handleKeyPress(event) {
            if (event.key === 'Enter' && !isTyping) {
                sendMessage();
            }
        }

        // Set contoh pertanyaan
        function setExample(text) {
            const input = document.getElementById('userInput');
            input.value = text;
            input.focus();
        }

        // Clear chat
        function clearChat() {
            const messagesDiv = document.getElementById('messages');
            messagesDiv.innerHTML = `
                <div class="message bot">
                    <div class="avatar">🤖</div>
                    <div class="message-content">
                        Chat telah dibersihkan! Ada yang bisa saya bantu?
                    </div>
                </div>
            `;
        }

        // Focus input saat halaman dimuat
        window.onload = () => {
            document.getElementById('userInput').focus();
        };
    </script>
</body>
</html>
